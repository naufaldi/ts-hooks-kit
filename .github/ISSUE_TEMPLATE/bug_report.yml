name: Bug Report
description: Report a bug in ts-hooks-kit
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.
  - type: input
    id: hook
    attributes:
      label: Hook name
      description: Which hook is affected?
      placeholder: e.g. useLocalStorage
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code snippet to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: react-version
    attributes:
      label: React version
      placeholder: e.g. 18.3.1 or 19.2.0
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: e.g. 0.1.0
    validations:
      required: true
